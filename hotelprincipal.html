<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: url('design_hotel.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
        background: linear-gradient(to right, #DA983C, #6f4616);
        width: 100%;
        padding: 5px 100px;
        display: flex;
        align-items: flex-start;
        justify-content: center; /* Centraliza horizontalmente */
        position: relative;
        height: 180px;
        }
        .header img {
            height: 200px; /* Ajuste o tamanho conforme necessário */
            display: block;
            margin-top: -15px;
        }
        .nav {
            margin-right: 20px;
            position: absolute;
            bottom: 5px;
            right: 75px;
        }
        .nav a {
            color: white;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
            margin: 0 15px;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .form-container {
            background-color: #7a7a40;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin-top: 50px;
        }
        .form-container input {
            display: block;
            width: 250px;
            padding: 10px;
            margin: 10px auto;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        label{
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">
        <nav class="nav">
            <a href="#">Sobre</a>
            <a href="#">Reservas</a>
            <a href="#">Login</a>
        </nav>
    </header>
    <div class="form-container">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email">
        
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf">
        
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone">
        
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha">
    </div>
</body>
</html>

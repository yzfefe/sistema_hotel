<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: url('../img/fotooo.png') no-repeat center center/cover;
            height: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
        border-radius: 10px;
        background: linear-gradient(to right, #465d53, #d3d3d3);
        width: 80%;
        padding: 5px 100px;
        display: flex;
        align-items: flex-start;
        justify-content: center; /* Centraliza horizontalmente */
        position: relative;
        height: 180px;
        }
        .header img {
            height: 200px; /* Ajuste o tamanho conforme necessário */
            display: block;
            margin-top: -15px;
        }
        .nav {
            margin-right: 0px;
            position: absolute;
            bottom: 5px;
            right: 40px;
        }
        .nav a {
            color: white;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
            margin: 0 15px;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .form-container {
            background-color: #2c3330;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin-top: 50px;
        }
        .form-container input {
            display: block;
            width: 250px;
            padding: 10px;
            margin: 10px auto;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        label{
            color: white;
            font-weight: bold;
        }
        .btn-enviar{
            display: flex;
            flex-direction: column;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #636851;
            color: white; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-enviar:hover {
          background-color: #99a285; /* Cor ao passar o mouse */
        
        }

        
    </style>
</head>
<body>
    <header class="header">
        <img src="../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">
        <nav class="nav">
            <a href="#">SAIR</a>
        </nav>
    </header>
    <div class="form-container">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

        <label for="rg">RG:</label>
        <input type="text" id="rg" name="rg" placeholder="Digite seu RG">

        <label for="Endereço">Endereço:</label>
        <input type="text" id="Endereço" name="Endereço" placeholder="Digite seu Endereço">

        <label for="login">Login:</label>
        <input type="text" id="login" name="login" placeholder="Digite seu Login">

        <label for="senha">Confirme a senha:</label>
        <input type="password" id="Confirme a senha" name="Confirme a senha" placeholder="Confirme a Senha">

       <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu E-mail">
        
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF">
        
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="Digite seu Telefone">
        
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Informe a Senha">
    </div>

    <button class="btn-enviar" onclick="confirmarCadastro()">Enviar</button>

    

</body>
    <script>
    function confirmarCadastro() {
        alert("Cadastro realizado com sucesso!");
    }
</script>
</html>

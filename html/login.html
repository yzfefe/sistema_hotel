<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
        background-color: #fff;
        width: 100%;
        height: 1000px;
        display: flex;
        flex-direction: column;
        align-items: center;
        }
        .header {
        background: linear-gradient(180deg, rgb(107, 57, 42, 0.946) 6%, rgba(133,78,57,1)18%, rgb(203, 164, 122) 60%, rgba(217,192, 164, 0.339) 90%, rgba(255,255,255,1)110%);
        width: 100%;
        padding: 5px 100px;
        display: flex;
        align-items: flex-start;
        justify-content: center; /* Centraliza horizontalmente */
        position: relative;
        height: 180px;
        }
        .header img {
            height: 200px; /* Ajuste o tamanho conforme necessário */
            display: block;
            margin-top: -15px;
        }
        .form-container {
            border: 3.5px solid black;
            background-color: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin-top: 120px;
        }
        .form-container input {
            display: block;
            width: 250px;
            padding: 10px;
            margin: 10px auto;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        label{
            color: black;
        }
        .btn-enviar{
            display: flex;
            flex-direction: column;
            margin: 20px auto;
            padding: 10px 50px;
            background-color: #c49a6c;
            color: white; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }

        .btn-enviar:hover {
          background-color: #7d3a26; /* Cor ao passar o mouse */
          
        }

        
    </style>
</head>
<body>
    <header class="header">
        <img src="../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">
        
    </header>
    <div class="form-container">

        <label for="email">E-mail:</label>
        <input type="text" id="email" name="email" placeholder="Digite seu E-mail">
        
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Informe a Senha">

    </div>

    <button class="btn-enviar" onclick="confirmarCadastro()">Enviar</button>

    

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <link rel="stylesheet" href="../css/Registro de hóspedes.css">
</head>
<body>
    <header class="header">
        <img src="../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">
        
    </header>
    <div class="form-container">

        <div class="grid">

            <div class="colun">

                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

                <label for="rg">RG:</label>
                <input type="text" id="rg" name="rg" placeholder="Digite seu RG"  onkeypress="RG()" maxlength= 12>

                <label for="Endereço">Endereço:</label>
                <input type="text" id="Endereço" name="Endereço" placeholder="Digite seu Endereço">

                <label for="login">Login:</label>
                <input type="text" id="login" name="login" placeholder="Digite seu Login">

            </div>

            <div class="colun">

                <label for="email">E-mail:</label>
                <input type="text" id="email" name="email" placeholder="Digite seu E-mail" onkeypress="email()">

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" onkeypress="cpf()" maxlength="14">

                <label for="telefone">Telefone:</label>
                <input type="text" id="telefone" name="telefone" placeholder="Digite seu Telefone"  onkeypress="telefone()" maxlength=14>

                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Informe a Senha">

            </div>

        </div>

        <div class="confirm">
            <label for="senha">Confirme a senha:</label>
            <input type="password" id="Confirme a senha" name="Confirme a senha" placeholder="Confirme a Senha">
        </div>
        
    </div>

    <button class="btn-enviar" onclick="confirmarCadastro()">Enviar</button>

    

</body>
    <script>
    function confirmarCadastro() {
        alert("Cadastro realizado com sucesso!");
    }
    function cpf(){
        let cpf = document.querySelector("#cpf")
        let cpfcaractere = cpf.value.length
        
        if (cpfcaractere === 3 || cpfcaractere === 7) {
            cpf.value += "."
        }
        else if(cpfcaractere === 11){
            cpf.value += "-"
        }
    }
    function RG(){
        let rg = document.querySelector("#rg")
        let rgcaractere = rg.value.length
        
        if(rgcaractere === 10){
            rg.value += "-"
        }
        
    }
    function telefone(){
        let tel = document.querySelector("#telefone")
        let telcaractere = tel.value.length
        
        if (telcaractere === 0) {
            tel.value = "(" + tel.value 
        }
        else if(telcaractere === 3){
            tel.value += ") "
        }
        else if(telcaractere === 9){
            tel.value += "-"
        }
    }
    function email(){
        let email = document.querySelector("#email")
        email.value = email.value.toLowerCase()
    }
</script>
</html>

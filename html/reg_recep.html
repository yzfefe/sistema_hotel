<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            
            height: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
        background: linear-gradient(180deg, rgba(107, 57, 42, 0.946) 6%, rgba(133,78,57,1) 18%, rgb(203, 164, 122) 60%, rgba(217, 192, 164, 0.339) 90%, rgba(255,255,255,1) 110%);
        width: 100%;
        padding: 5px 100px;
        display: flex;
        justify-content: center; /* Centraliza horizontalmente */
        position: relative;
        height: 180px;
        }
        .header img {
            height: 200px; /* Ajuste o tamanho conforme necessário */
            display: block;
            margin-top: -15px;
        }
        
        .form-container {
            background-color: #505b40;
            display: flex;
            gap: 1rem;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin-top: 50px;
        }
        .form-container input {
            display: block;
            width: 250px;
            padding: 10px;
            margin: 10px auto;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .colun{
            display: flex;
            flex-direction: column;
        }

        label{
            color: white;
            font-weight: bold;
        }
        .btn-enviar{
            display: flex;
            flex-direction: column;
            margin: 20px auto;
            padding: 10px 50px;
            background-color: #c49a6c;
            color: white; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }

        .btn-enviar:hover {
          background-color: #7d3a26; /* Cor ao passar o mouse */
        
        }

        
    </style>
</head>
<body>
    <header class="header">
        <img src="../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">


    </header>
    <div class="form-container">

    <div class="colun">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

        <label for="rg">RG:</label>
        <input type="number" id="rg" name="rg" placeholder="Digite seu RG">

        <label for="Endereço">Endereço:</label>
        <input type="text" id="Endereço" name="Endereço" placeholder="Digite seu Endereço">

        <label for="login">Login:</label>
        <input type="text" id="login" name="login" placeholder="Digite seu Login">

        <label for="rg">Horário de trabalho:</label>
        <input type="time" id="Horario de trabalho" name="Horario de trabalho">
    </div>
        
    <div class="colun">
        <label for="email">E-mail:</label>
        <input type="text" id="email" name="email" placeholder="Digite seu E-mail">
        
        <label for="cpf">CPF:</label>
        <input type="number" id="cpf" name="cpf" placeholder="Digite seu CPF" onkeypress="cpf()">
        
        <label for="telefone">Telefone:</label>
        <input type="number" id="telefone" name="telefone" placeholder="Digite seu Telefone">
        
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Informe a Senha">

        <label for="senha">Confirme a senha:</label>
        <input type="password" id="Confirme a senha" name="Confirme a senha" placeholder="Confirme a Senha">
    </div>
        

    </div>

    <button class="btn-enviar" onclick="confirmarCadastro()">Enviar</button>

    

</body>
    <script>
    function confirmarCadastro() {
        alert("Cadastro realizado com sucesso!");
    }

    function cpf() {
        let cpf = document.querySelector("#cpf")
    }
</script>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
        background: linear-gradient(180deg, rgba(117,49, 28, 0.946) 6%, rgba(133,78,57,1)18%, rgb(203, 164, 122) 60%, rgba(214, 162, 102, 0.339) 90%, rgba(255,255,255,1)110%);
        width: 100%;
        height: 1000px;
        display: flex;
        flex-direction: column;
        align-items: center;
        }
        
        .header img {
            height: 400px;
            margin-top: 10px;
        }
        .btn-cad{
            margin-top: -20px;
            margin-left: -3px;
            padding: 15px 85px;
            background-color: #d2b48c;
            color: #ffffff; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }
        .btn-sal{
            margin-top: 30px;
            padding: 15px 60px;
            background-color: #d2b48c;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }
        .btn-reserv{
            margin-top: 30px;
            padding: 15px 98px;
            background-color: #d2b48c;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }
        button:hover{
            background-color: #7d3a26;
        }
        

        
        
        
    </style>
</head>
<body>
    <header class="header">
        <img src="../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">
    </header>
   
    
        <button class="btn-cad">CADASTRAR HÓSPEDE</button>  
        <button class="btn-sal">AGENDAR SALÃO DE FESTAS</button> 
        <button class="btn-reserv">RESERVAR QUARTO</button>

</body>
</html>

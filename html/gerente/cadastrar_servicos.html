
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Serviços - Caminho das Pedras</title>
    <link rel="stylesheet" href="../css/cadastrar_servicos.css"> 
</head>
<body>
    <header class="header">
        <img src="../../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">
    </header>
    
    <form action="../../php/gerente/cadastrar_servicos.php" method="post">
        <div class="form-container">
            <label for="nome">Serviço</label>
            <input type="text" id="nome" name="nome" placeholder="Informe o serviço" required>
            <label for="preco">Preço</label>
            <input type="number" id="preco" name="preco" placeholder="Informe o preço" required>
            <label for="horario">Horário</label>
            <input type="time" id="horario" name="horario" required>
        </div>
        
        <button  class="btn-enviar" type="submit">Cadastrar</button>
        <button class="btn-voltar" onclick="red()">Voltar</button>
    </form>

        <script>
            function red(){
                window.location.href = "http://127.0.0.1:5500/html/tela_gerente.html"
            }
        </script>
    
</body>
</html>

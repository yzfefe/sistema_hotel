<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <link rel="stylesheet" href="../css/cadastrar_servicos.css">
    
</head>
<body>
    <header class="header">
        <img src="../../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">


    </header>
    
        <div class="form-container">

            <label for="nome">Serviço:</label>
            <input type="nome" id="nome" name="nome" placeholder="Informe o serviço">
            
            <label for="preço">Preço:</label>
            <input type="number" id="preco" name="preco" placeholder="Informe o preço"> 
            
            <label for="horario">Horário:</label>
            <input type="time" id="horario" name="horario">

        </div>

        <button class="btn-enviar" type="submit">Enviar</button>
    
    

</body>
</html>

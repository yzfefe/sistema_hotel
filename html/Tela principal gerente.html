<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
        background: linear-gradient(180deg, rgba(117,49, 28, 0.946) 6%, rgba(133,78,57,1)18%, rgb(203, 164, 122) 60%, rgba(214, 162, 102, 0.339) 90%, rgba(255,255,255,1)110%);
        width: 100%;
        height: 1000px;
        display: flex;
        flex-direction: column;
        align-items: center;
        }
        
        .header img {
            height: 400px;
            margin-top: 10px;
        }
        .btn-serv{
            margin-top: 100px;
            margin-left: -5px;
            padding: 15px 90px;
            background-color: #d2b48c;
            color: #ffffff; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }
        .btn-cad{
            margin-top: -180px;
            margin-left: -5px;
            padding: 15px 62px;
            background-color: #d2b48c;
            color: #ffffff; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }
        .btn-prom{
            margin-top: 150px;
            margin-left: -5px;
            padding: 15px 125px;
            background-color: #d2b48c;
            color: #ffffff; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }
        .btn-quarto{
            margin-top: -180px;
            margin-left: -3px;
            padding: 15px 90px;
            background-color: #d2b48c;
            color: #ffffff; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }
        .btn-relat{
            margin-top: 150px;
            margin-left: -5px;
            padding: 15px 125px;
            background-color: #d2b48c;
            color: #ffffff; /* Cor do texto */
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.4s ease;
        }
        button:hover{
            background-color: #7d3a26;
        }
        

        
        
        
    </style>
</head>
<body>
    <header class="header">
        <img src="../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">
    </header>
   
    <button class="btn-serv" onclick="red1()">CADASTRAR SERVIÇO</button>
    <button class="btn-cad" onclick="red2()">CADASTRAR RECEPCIONISTA</button>
    <button class="btn-prom" onclick="red3()">PROMOÇÕES</button>
    <button class="btn-quarto" onclick="red4()">CADASTRAR QUARTO</button>
    <button class="btn-relat" onclick="red5()">RELATÓRIOS</button>  


    <script>
        function red1(){
            window.location.href = "http://127.0.0.1:5500/html/Cadastro%20de%20servi%C3%A7os.html"
        }

        function red2(){
            window.location.href = "http://127.0.0.1:5500/html/Registro%20do(a)%20recepcionista.html"
        }

        function red4(){
            window.location.href = "http://127.0.0.1:5500/html/Cadastro%20de%20quartos.html"
        }

        function red5(){
            window.location.href = "http://127.0.0.1:5500/html/relat%C3%B3rios.html"
        }
    </script>
</body>
</html>

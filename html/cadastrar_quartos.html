<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caminho das Pedras - Rustic Hotel</title>
    <link rel="stylesheet" href="../css/Cadastro de quartos.css">
</head>
<body>
    <header class="header">
        <img src="../img/logo_hoteel.png" alt="Caminho das Pedras - Rustic Hotel">


    </header>
    <div class="form-container">

        <label for="nome">Nº do Quarto:</label>
        <input type="number" id="nome" name="nome" placeholder="Informe o nº do quarto">
        
        <label for="andar">Andar:</label>
        <input type="number" id="andar" name="andar" placeholder="Informe o andar do quarto"> 
        
        <label for="tipo">Tipo:</label>
        <input type="string" id="tipo" name="tipo" placeholder="Ex:(suíte normal ou suíte plus)">

    </div>

    <button class="btn-enviar" onclick="confirmarCadastro()">Enviar</button>

    

</body>
    <script>
    function confirmarCadastro() {
        alert("Cadastro realizado com sucesso!");
    }
    

</script>
</html>
